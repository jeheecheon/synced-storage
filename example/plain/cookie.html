<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>synced-storage — Cookie</title>
  </head>
  <body
    style="
      font-family: monospace;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 2rem;
    "
  >
    <div
      style="
        border: 1px solid #333;
        border-radius: 6px;
        padding: 1.25rem;
        width: 220px;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      "
    >
      <div
        style="
          font-size: 0.7rem;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: #666;
        "
      >
        Cookie
      </div>
      <div
        id="cookie-val"
        style="
          font-size: 1.6rem;
          font-weight: bold;
          color: #fbbf24;
          min-height: 2rem;
        "
      >
        0
      </div>
      <div style="display: flex; gap: 0.5rem">
        <button
          id="c-inc"
          style="
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.3rem 0.7rem;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          +1
        </button>
        <button
          id="c-dec"
          style="
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.3rem 0.7rem;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          -1
        </button>
        <button
          id="c-reset"
          style="
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.3rem 0.7rem;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          reset
        </button>
      </div>
    </div>

    <script type="importmap">
      { "imports": { "synced-storage/core": "https://esm.sh/synced-storage@latest/core" } }
    </script>
    <script type="module">
      import { CookieClient } from "synced-storage/core";

      const client = new CookieClient();
      const store = client.getOrCreateStore("demo-counter", 0);
      const val = document.getElementById("cookie-val");

      store.subscribe((v) => {
        val.textContent = v;
      });

      document.getElementById("c-inc").onclick = () =>
        store.setItem(store.getItem() + 1);
      document.getElementById("c-dec").onclick = () =>
        store.setItem(store.getItem() - 1);
      document.getElementById("c-reset").onclick = () => store.setItem(0);
    </script>
  </body>
</html>
