<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>synced-storage — core demo</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; margin: 0; padding: 2rem; }
    h1 { font-size: 1rem; color: #888; margin-bottom: 2rem; }
    .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .card { border: 1px solid #333; border-radius: 6px; padding: 1.25rem; width: 220px; display: flex; flex-direction: column; gap: 0.75rem; }
    .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
    .value { font-size: 1.6rem; font-weight: bold; min-height: 2rem; word-break: break-all; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button { font-family: monospace; font-size: 0.75rem; padding: 0.3rem 0.7rem; border: 1px solid #444; background: #1e1e1e; color: #ccc; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2a2a2a; }
    input { font-family: monospace; font-size: 0.8rem; background: #1a1a1a; border: 1px solid #444; color: #eee; border-radius: 4px; padding: 0.3rem 0.5rem; width: 100%; box-sizing: border-box; }
    .bar-wrap { height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
    .bar { height: 100%; background: #10b981; width: 0%; transition: width 0.3s linear; }
    .cookie .value { color: #fbbf24; }
    .local .value { color: #818cf8; }
    .session .value { color: #34d399; }
  </style>
</head>
<body>
  <h1>synced-storage / core demo</h1>
  <div class="cards">
    <div class="card cookie">
      <div class="label">Cookie</div>
      <div class="value" id="cookie-val">0</div>
      <div class="actions">
        <button id="c-inc">+1</button>
        <button id="c-dec">-1</button>
        <button id="c-reset">reset</button>
      </div>
    </div>
    <div class="card local">
      <div class="label">localStorage</div>
      <div class="value" id="local-val" style="font-size:1rem">—</div>
      <input id="local-input" placeholder="type and save…" />
      <div class="actions">
        <button id="l-save">save</button>
        <button id="l-clear">clear</button>
      </div>
    </div>
    <div class="card session">
      <div class="label">sessionStorage (15s expiry)</div>
      <div class="value" id="session-val" style="font-size:1rem">—</div>
      <div class="bar-wrap"><div class="bar" id="bar"></div></div>
      <div class="actions">
        <button id="s-set">set + 15s expiry</button>
        <button id="s-reset">reset</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { CookieClient, StorageClient } from "https://esm.sh/synced-storage@1.2.0/core";

    // Cookie
    const cookieClient = new CookieClient();
    const cookieStore = cookieClient.getOrCreateStore("demo-counter", 0);
    const cookieVal = document.getElementById("cookie-val");
    cookieStore.subscribe(v => { cookieVal.textContent = v; });
    document.getElementById("c-inc").onclick = () => cookieStore.setItem(cookieStore.getItem() + 1);
    document.getElementById("c-dec").onclick = () => cookieStore.setItem(cookieStore.getItem() - 1);
    document.getElementById("c-reset").onclick = () => cookieStore.setItem(0);

    // localStorage
    const storageClient = new StorageClient();
    const localStore = storageClient.getOrCreateStore("demo-message", "", { strategy: "localStorage" });
    const localVal = document.getElementById("local-val");
    const localInput = document.getElementById("local-input");
    localStore.subscribe(v => { localVal.textContent = v || "—"; });
    document.getElementById("l-save").onclick = () => { if (localInput.value) localStore.setItem(localInput.value); };
    document.getElementById("l-clear").onclick = () => { localStore.removeItem(); localInput.value = ""; };

    // sessionStorage with expiry
    let sessionStore = null;
    let barTimer = null;
    const sessionVal = document.getElementById("session-val");
    const bar = document.getElementById("bar");

    function initSessionStore(expires) {
      if (sessionStore) { sessionStore.removeItem(); }
      sessionStore = storageClient.getOrCreateStore("demo-session-" + Date.now(), "active!", {
        strategy: "sessionStorage",
        expires,
      });
      sessionStore.subscribe(v => {
        sessionVal.textContent = v || "—";
        if (!v) { bar.style.width = "0%"; }
      });
    }

    document.getElementById("s-set").onclick = () => {
      const expires = new Date(Date.now() + 15000);
      initSessionStore(expires);
      if (barTimer) clearInterval(barTimer);
      const end = expires.getTime();
      barTimer = setInterval(() => {
        const left = end - Date.now();
        if (left <= 0) { bar.style.width = "0%"; clearInterval(barTimer); return; }
        bar.style.width = (left / 15000 * 100) + "%";
      }, 100);
    };

    document.getElementById("s-reset").onclick = () => {
      if (sessionStore) { sessionStore.removeItem(); }
      if (barTimer) clearInterval(barTimer);
      bar.style.width = "0%";
    };
  </script>
</body>
</html>
