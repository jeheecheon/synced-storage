<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>synced-storage — sessionStorage</title>
    <style>
      body {
        font-family: monospace;
        background: #111;
        color: #eee;
        margin: 0;
        padding: 2rem;
      }
      a {
        font-size: 0.75rem;
        color: #666;
        text-decoration: none;
      }
      a:hover {
        color: #aaa;
      }
      .card {
        border: 1px solid #333;
        border-radius: 6px;
        padding: 1.25rem;
        width: 220px;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }
      .label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #666;
      }
      .value {
        font-size: 1rem;
        font-weight: bold;
        color: #34d399;
        min-height: 2rem;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      button {
        font-family: monospace;
        font-size: 0.75rem;
        padding: 0.3rem 0.7rem;
        border: 1px solid #444;
        background: #1e1e1e;
        color: #ccc;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #2a2a2a;
      }
      .bar-wrap {
        height: 3px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        background: #10b981;
        width: 0%;
        transition: width 0.3s linear;
      }
    </style>
  </head>
  <body>
    <a href="./index.html">← back</a>
    <div class="card">
      <div class="label">sessionStorage (15s expiry)</div>
      <div class="value" id="session-val">—</div>
      <div class="bar-wrap"><div class="bar" id="bar"></div></div>
      <div class="actions">
        <button id="s-set">set + 15s expiry</button>
        <button id="s-reset">reset</button>
      </div>
    </div>

    <script type="module">
      import { StorageClient } from "https://esm.sh/synced-storage@1.2.0/core";

      const client = new StorageClient();
      const val = document.getElementById("session-val");
      const bar = document.getElementById("bar");

      let store = null;
      let barTimer = null;

      function initStore(expires) {
        if (store) {
          store.removeItem();
        }

        store = client.getOrCreateStore("demo-session-" + Date.now(), "active!", {
          strategy: "sessionStorage",
          expires,
        });

        store.subscribe((v) => {
          val.textContent = v || "—";

          if (!v) {
            bar.style.width = "0%";
          }
        });
      }

      document.getElementById("s-set").onclick = () => {
        const expires = new Date(Date.now() + 15000);

        initStore(expires);

        if (barTimer) {
          clearInterval(barTimer);
        }

        const end = expires.getTime();

        barTimer = setInterval(() => {
          const left = end - Date.now();

          if (left <= 0) {
            bar.style.width = "0%";
            clearInterval(barTimer);
            return;
          }

          bar.style.width = (left / 15000) * 100 + "%";
        }, 100);
      };

      document.getElementById("s-reset").onclick = () => {
        if (store) {
          store.removeItem();
        }

        if (barTimer) {
          clearInterval(barTimer);
        }

        bar.style.width = "0%";
      };
    </script>
  </body>
</html>
