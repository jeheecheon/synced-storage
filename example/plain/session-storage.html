<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>synced-storage — sessionStorage</title>
  </head>
  <body style="font-family:monospace;background:#111;color:#eee;margin:0;padding:2rem;">
    <div style="border:1px solid #333;border-radius:6px;padding:1.25rem;width:220px;display:flex;flex-direction:column;gap:0.75rem;">
      <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:#666;">sessionStorage</div>
      <div id="val" style="font-size:1.6rem;font-weight:bold;color:#34d399;min-height:2rem;">0</div>
      <div style="display:flex;gap:0.5rem;">
        <button id="inc" style="font-family:monospace;font-size:0.75rem;padding:0.3rem 0.7rem;border:1px solid #444;background:#1e1e1e;color:#ccc;border-radius:4px;cursor:pointer;">+1</button>
        <button id="dec" style="font-family:monospace;font-size:0.75rem;padding:0.3rem 0.7rem;border:1px solid #444;background:#1e1e1e;color:#ccc;border-radius:4px;cursor:pointer;">-1</button>
        <button id="reset" style="font-family:monospace;font-size:0.75rem;padding:0.3rem 0.7rem;border:1px solid #444;background:#1e1e1e;color:#ccc;border-radius:4px;cursor:pointer;">reset</button>
      </div>
    </div>

    <script type="module">
      import { StorageClient } from "https://esm.sh/synced-storage@1.2.0/core";

      const client = new StorageClient();
      const store = client.getOrCreateStore("demo-ss-counter", 0, { strategy: "sessionStorage" });
      const val = document.getElementById("val");

      store.subscribe((v) => {
        val.textContent = v;
      });

      document.getElementById("inc").onclick = () => store.setItem(store.getItem() + 1);
      document.getElementById("dec").onclick = () => store.setItem(store.getItem() - 1);
      document.getElementById("reset").onclick = () => store.setItem(0);
    </script>
  </body>
</html>
